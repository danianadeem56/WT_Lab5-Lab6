<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques and Responsive Design</title>
    <style>
      /* Task 6: CSS Grid Photo Gallery */
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
      }

      h1 {
        text-align: center;
        margin-top: 40px;
        font-size: 20px;
      }
      li {
        list-style: none;
        margin-bottom: 15px;
        text-align: center;
      }

      li a {
        color: black;
      }

      li a:hover {
        color: navy;
        cursor: pointer;
      }
      /* Gallery Container */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        grid-auto-rows: 200px;
        gap: 15px;
        padding: 20px;
      }

      /* Grid Items */
      .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 10px;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
      }

      /*  Hover Effect */
      .gallery-item:hover img {
        transform: scale(1.5);
      }

      .gallery-item .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(122, 155, 189, 0.6);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        font-size: 18px;
        text-align: center;
        padding: 10px;
      }

      .gallery-item:hover .overlay {
        opacity: 1;
      }

      /* - Masonry effect with different row spans */
      .gallery-item:nth-child(3n + 1) {
        grid-row: span 2;
      }
      .gallery-item:nth-child(4n + 2) {
        grid-row: span 3;
      }
      .gallery-item:nth-child(5n + 3) {
        grid-row: span 2;
      }

      /* Responsive Designs */
      @media screen and (max-width: 768px) {
        h1 {
          font-size: 20px;
        }
        .gallery {
          grid-auto-rows: 150px;
        }
      }

      @media screen and (max-width: 480px) {
        .gallery {
          grid-auto-rows: 120px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Task 6 -->
    <h1>Task 6: CSS Grid Photo Gallery</h1>
    <li><a href="/index.html">Home Page</a></li>
    <div class="gallery">
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 1" />
        <div class="overlay">Photo 1</div>
      </div>
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 2" />
        <div class="overlay">Photo 2</div>
      </div>
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 3" />
        <div class="overlay">Photo 3</div>
      </div>
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 4" />
        <div class="overlay">Photo 4</div>
      </div>
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 5" />
        <div class="overlay">Photo 5</div>
      </div>
      <div class="gallery-item">
        <img src="images/card9.jpg" alt="Photo 6" />
        <div class="overlay">Photo 6</div>
      </div>
    </div>
  </body>
</html>
