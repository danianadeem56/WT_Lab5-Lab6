<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques and Responsive Design</title>
    <style>
      /* Task 4: Flexbox Navigation System */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      a {
        text-decoration: none;
        color: #fff;
      }
      h1 {
        text-align: center;
        margin-top: 2%;
        font-size: 20px;
      }
      .link {
        margin-top: 1%;
        list-style: none;
        margin-bottom: 15px;
        text-align: center;
      }
      .link a {
        text-decoration: underline;
        color: black;
      }
      .link a:hover {
        color: navy;
        cursor: pointer;
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #2c3e50;
        padding: 15px;
        position: relative;
      }
      .navbar .logo {
        font-size: 18px;
        font-weight: bold;
        color: white;
      }

      /* Navbar links */
      .navbar ul {
        display: flex;
        gap: 1rem;
        list-style: none;
      }
      .navbar li {
        position: relative;
      }
      .navbar li a {
        display: block;
        padding: 5px;
      }
      .navbar li a:hover {
        text-decoration: underline;
      }

      /* Hamburger Icon */
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
      }
      .hamburger div {
        width: 25px;
        height: 3px;
        background-color: white;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 65px;
        left: 0;
        width: 250px;
        height: 100%;
        background-color: #2c3e50;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 1000;
        padding-top: 2rem;
      }
      .sidebar a {
        padding: 0.75rem 1.25rem;
      }
      .sidebar a:hover {
        background-color: #34495e;
      }

      .sidebar .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        color: #fff;
        padding: 0.25rem 0.5rem;
        text-align: center;
      }
      .sidebar .close-btn:hover {
        background-color: #34495e;
      }
      #sidebar:target {
        transform: translateX(0);
      }

      /* Responsive design */
      @media (max-width: 768px) {
        h1 {
          font-size: 20px;
        }
        .hamburger {
          display: flex;
        }
        .navbar ul {
          display: none;
        }
        .sidebar {
          top: 60px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Task 4-->
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">Navigation</div>

      <!-- Hamburger: link to sidebar -->
      <a href="#sidebar" class="hamburger">
        <div></div>
        <div></div>
        <div></div>
      </a>

      <ul>
        <li><a href="#sidebar">Dashboard</a></li>
      </ul>
    </nav>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <a href="#" class="close-btn">×</a>
      <a href="/index.html">Home Page</a>
    </div>

    <h1>Task 4: Flexbox Navigation System</h1>
    <li class="link"><a href="/index.html">Home Page</a></li>
  </body>
</html>
