<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques and Responsive Design</title>
    <style>
      /* Task 9: Dashboard Layout */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
      }
      h1 {
        text-align: center;
        font-size: 20px;
      }
      li {
        list-style: none;
      }
      li a {
        text-decoration: none;
      }
      li a:hover {
        text-decoration: underline;
      }
      /* Navbar */
      .navbar {
        background: #2c3e50;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
      }

      .navbar .logo {
        font-weight: bold;
        font-size: 20px;
      }

      .menu-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
      }

      .menu-toggle span {
        height: 3px;
        width: 25px;
        background: white;
        margin: 4px 0;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 60px;
        left: 0;
        width: 220px;
        height: calc(100% - 60px);
        background: #2c3e50;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        transition: transform 0.3s ease;
      }

      .sidebar a {
        color: white;
        text-decoration: none;
        margin-bottom: 12px;
        display: block;
        font-weight: bold;
      }

      #sidebar-toggle {
        display: none;
      }

      #sidebar-toggle:checked + .sidebar {
        transform: translateX(0);
      }

      /* Main Content */
      .main-content {
        margin-left: 220px;
        padding: 80px 20px 20px 20px;
        transition: margin-left 0.3s ease;
      }
      .main-content h2 {
        margin-bottom: 20px;
        text-align: center;
      }

      /* Stat Cards */
      .stat-cards {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .stat-card {
        background: white;
        flex: 1 1 200px;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .stat-card h3 {
        margin-bottom: 10px;
      }

      .stat-card p {
        font-size: 24px;
        font-weight: bold;
      }

      /* Responsive Design */
      @media (max-width: 992px) {
        .menu-toggle {
          display: flex;
        }
        .sidebar {
          transform: translateX(-100%);
          z-index: 999;
        }
        .main-content {
          margin-left: 0;
        }
        .main-content h2 {
          font-size: 18px;
        }
      }

      @media (max-width: 600px) {
        .stat-cards {
          flex-direction: column;
        }
        .stat-card {
          flex: 1 1 auto; /* allow card to shrink naturally */
          padding: 12px; /* reduce padding further */
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">Admin Dashboard</div>
      <!-- Toggle for mobile -->
      <label for="sidebar-toggle" class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </label>
    </div>

    <!-- Sidebar Toggle Checkbox -->
    <input type="checkbox" id="sidebar-toggle" />

    <!-- Sidebar -->
    <div class="sidebar">
      <li><a href="/index.html">Home Page</a></li>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <h1>Task 9: Dashboard Layout</h1>
      <h2>Welcome to Admin Dashboard</h2>

      <div class="stat-cards">
        <div class="stat-card">
          <h3>Admin</h3>
          <p>1</p>
        </div>
        <div class="stat-card">
          <h3>Users</h3>
          <p>50</p>
        </div>
        <div class="stat-card">
          <h3>Orders</h3>
          <p>50</p>
        </div>
        <div class="stat-card">
          <h3>Messages</h3>
          <p>20</p>
        </div>
      </div>
    </div>
  </body>
</html>
