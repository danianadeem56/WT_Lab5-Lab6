<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques and Responsive Design</title>

    <style>
      /* Task 14: Responsive Data Table */
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      h1 {
        text-align: center;
        font-size: 20px;
      }
      li {
        list-style: none;
        margin-bottom: 15px;
        text-align: center;
      }

      li a {
        color: black;
      }

      li a:hover {
        color: navy;
        cursor: pointer;
      }

      /* TABLE (DESKTOP DEFAULT) */
      table {
        width: 80%;
        border-collapse: collapse;
        margin: 20px auto;
        color: black;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
        text-decoration: dotted;
      }

      th {
        background-color: #2c3e50;
        color: white;
      }

      /* TABLET VIEW (CARD STYLE) */
      @media (max-width: 992px) {
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead {
          display: none;
        }
        tr {
          background: whitesmoke;
          margin-bottom: 15px;
          padding: 10px;
          border: 1px solid #ddd;
          border-radius: 5px;
        }

        td {
          display: flex;
          justify-content: space-between;
          padding: 10px;
          border: none;
          border-bottom: 1px solid #eee;
        }

        td::before {
          content: attr(data-label);
          font-weight: bold;
        }
      }

      /*  Mobile  */
      @media (max-width: 576px) {
        h1 {
          font-size: 20px;
        }
        /* td {
    flex-direction: column;
    align-items: flex-start;
  }

  td::before {
    margin-bottom: 5px;
  } */
        .table thead {
          display: none;
        }
        .table,
        .table tbody,
        .table tr,
        .table td {
          display: block;
          width: 80%;
          margin: auto;
        }
        .table tr {
          margin-bottom: 15px;
        }
        .table tbody tr td {
          text-align: right;
          padding-left: 50%;
          position: relative;
        }
        .table td::before {
          content: attr(data-label);
          position: absolute;
          left: 0;
          width: 50%;
          padding-left: 10px;
          font-weight: 600;
          font-size: 15px;
          text-align: left;
        }
      }
    </style>
  </head>

  <body>
    <h1>Task 14: Responsive Data Table</h1>
    <li><a href="/index.html">Home Page</a></li>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Semester</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td data-label="ID">101</td>
          <td data-label="Name">Dania Nadeem</td>
          <td data-label="Department">Computer Science</td>
          <td data-label="Semester">4th</td>
        </tr>

        <tr>
          <td data-label="ID">102</td>
          <td data-label="Name">Sara Ahmed</td>
          <td data-label="Department">Software Engineering</td>
          <td data-label="Semester">4th</td>
        </tr>

        <tr>
          <td data-label="ID">103</td>
          <td data-label="Name">Ayesha Nadeem</td>
          <td data-label="Department">IT</td>
          <td data-label="Semester">4th</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
