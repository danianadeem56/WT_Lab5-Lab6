<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques and Responsive Design</title>
    <style>
      /* Task 10: Media Query Demonstration */
      body {
        margin: 0;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      h1 {
        text-align: center;
        font-size: 20px;
      }
      li {
        list-style: none;
        margin-bottom: 15px;
        text-align: center;
      }

      li a {
        color: black;
      }

      li a:hover {
        color: navy;
        cursor: pointer;
      }

      /* Header */
      header {
        background: #2c3e50;
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Breakpoint Indicator */
      .breakpoint {
        text-align: center;
        padding: 10px;
        background: #4f7ca8;
        color: white;
        font-weight: bold;
      }

      /* Content Layout */
      .content {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        padding: 20px;
      }

      .card {
        background: #ecf0f1;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
      }

      /* Typography */
      h1 {
        font-size: 32px;
      }
      p {
        font-size: 16px;
      }

      /* Responsive Designs */

      /* Tablet */
      @media screen and (max-width: 992px) {
        .breakpoint::after {
          content: " (Tablet ≤992px)";
        }
        .content {
          grid-template-columns: 1fr 1fr;
        }
        h1 {
          font-size: 28px;
        }
        p {
          font-size: 15px;
        }
        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      /* Mobile */
      @media screen and (max-width: 600px) {
        .breakpoint::after {
          content: " (Mobile ≤600px)";
        }
        .content {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 24px;
        }
        p {
          font-size: 14px;
        }
        header .nav-links {
          flex-direction: column;
          gap: 10px;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Task 10 -->
    <!-- Header / Navigation -->
    <header>
      <div class="logo">MediaQuery Demo</div>
    </header>
    <!-- Breakpoint Indicator -->
    <div class="breakpoint">Current Breakpoint:</div>

    <h1>Task 10: Media Query Demonstration</h1>
    <li><a href="/index.html">Home Page</a></li>
    <!-- Content Cards -->
    <div class="content">
      <div class="card">
        <h1>Card 1</h1>
        <p>This is Card 1.</p>
      </div>
      <div class="card">
        <h1>Card 2</h1>
        <p>This is Card 2.</p>
      </div>
      <div class="card">
        <h1>Card 3</h1>
        <p>This is Card 3.</p>
      </div>
    </div>
  </body>
</html>
