<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Layout Techniques s Responsive Design</title>
    <style>
      /* Task 18: Dark Mode & Accessibility Media Queries */

      /* Base mobile-first styles */
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
        font-size: 16px;
        color: #333;
        line-height: 1.5;
      }
      h1 {
        text-align: center;
      }
      li {
        list-style: none;
        margin-bottom: 2%;
        text-align: center;
      }
      li a {
        color: black;
      }
      li a:hover {
        cursor: pointer;
        color: navy;
      }
      .container {
        max-width: 500px;
        margin: 20px auto;
        padding: 10px;
        text-align: center;
      }

      .box {
        background: #2c3e50;
        color: white;
        padding: 20px;
        margin: 10px 0;
        border-radius: 8px;
      }

      /* prefers-color-scheme for Dark/Light Mode */
      @media (prefers-color-scheme: dark) {
        body {
          background: #1c1c1c;
          color: #f0f0f0;
        }
        .box {
          background: #333;
          color: #fff;
        }
      }

      @media (prefers-color-scheme: light) {
        body {
          background: #f4f4f4;
          color: #333;
        }
        .box {
          background: #2c3e50;
          color: white;
        }
      }

      /* prefers-reduced-motion for accessibility */
      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }

      /* prefers-contrast for high contrast mode */
      @media (prefers-contrast: more) {
        body {
          background: #000;
          color: #fff;
        }
        .box {
          background: #000;
          color: #fff;
          border: 2px solid #fff;
        }
      }

      /* Print media queries */
      @media print {
        body {
          background: #fff;
          color: #000;
        }
        .box {
          background: #fff;
          color: #000;
          border: 1px solid #000;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <!-- Task 18 -->
    <h1>Task 18: Dark Mode & Accessibility Media Queries</h1>
    <li><a href="/index.html">Home Page</a></li>
    <!-- Base container and boxes -->
    <div class="container">
      <div class="box">This is Dark Mode</div>
      <div class="box">This is Dark Mode</div>
      <div class="box">This is Dark Mode</div>
    </div>
  </body>
</html>
